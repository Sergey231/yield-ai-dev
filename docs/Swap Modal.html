<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f2;
    --modal-bg: #ffffff;
    --border: #e8e6e1;
    --border-focus: #c8c4bc;
    --text: #141210;
    --text-muted: #8a8680;
    --text-subtle: #b5b0a8;
    --accent: #141210;
    --accent-fg: #ffffff;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --error: #dc2626;
    --error-bg: #fef2f2;
    --warning: #d97706;
    --warning-bg: #fffbeb;
    --token-hover: #f8f7f5;
    --input-bg: #faf9f7;
    --radius: 16px;
    --radius-sm: 10px;
  }
  body {
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Modal overlay */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.32);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    padding: 16px;
  }
  .modal {
    background: var(--modal-bg);
    border-radius: var(--radius);
    width: 100%;
    max-width: 440px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
    overflow: hidden;
    position: relative;
  }

  /* Header */
  .modal-header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header-left {
    display: flex; align-items: center; gap: 8px;
  }
  .modal-logo {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #141210, #3a3530);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 12px; font-weight: 700;
  }
  .modal-title {
    font-size: 16px; font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .modal-header-right {
    display: flex; align-items: center; gap: 4px;
  }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none; background: transparent;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--token-hover); color: var(--text); }

  /* Body */
  .modal-body { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 4px; }

  /* Token Input Card */
  .token-card {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    background: var(--modal-bg);
    transition: border-color 0.15s, box-shadow 0.15s;
    cursor: default;
    position: relative;
  }
  .token-card:focus-within {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
  }
  .token-card-label {
    font-size: 11px; font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }
  .token-card-main {
    display: flex; align-items: center; gap: 12px;
  }

  /* Token selector button */
  .token-selector {
    display: flex; align-items: center; gap: 8px;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px 8px 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    white-space: nowrap;
    min-width: 0;
    flex-shrink: 0;
  }
  .token-selector:hover { border-color: var(--border-focus); background: var(--token-hover); }
  .token-selector-logo {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--text-muted);
    overflow: hidden;
  }
  .token-selector-logo img { width: 100%; height: 100%; object-fit: cover; }
  .token-selector-symbol { font-size: 14px; font-weight: 600; color: var(--text); }
  .token-selector-chevron { color: var(--text-muted); flex-shrink: 0; margin-left: 2px; }

  /* Amount input */
  .amount-wrap { flex: 1; min-width: 0; }
  .amount-input {
    width: 100%; border: none; background: transparent;
    font-size: 24px; font-weight: 600;
    color: var(--text);
    font-family: 'Geist', sans-serif;
    outline: none;
    letter-spacing: -0.5px;
    text-align: right;
    appearance: none;
    -moz-appearance: textfield;
  }
  .amount-input::placeholder { color: var(--text-subtle); }
  .amount-input::-webkit-outer-spin-button,
  .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .amount-usd {
    font-size: 12px; color: var(--text-muted);
    text-align: right; margin-top: 2px;
  }
  .amount-readonly {
    font-size: 24px; font-weight: 600;
    color: var(--text); text-align: right;
    letter-spacing: -0.5px;
    min-height: 32px; display: flex; align-items: center; justify-content: flex-end;
  }
  .amount-readonly.placeholder { color: var(--text-subtle); font-weight: 400; font-size: 20px; }
  .amount-readonly.loading {
    color: var(--text-subtle);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Balance row */
  .balance-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .balance-text { font-size: 12px; color: var(--text-muted); }
  .balance-text strong { color: var(--text); font-weight: 500; }
  .pct-btns { display: flex; gap: 4px; }
  .pct-btn {
    font-size: 11px; font-weight: 500;
    padding: 3px 8px; border-radius: 5px;
    border: 1.5px solid var(--border);
    background: transparent; color: var(--text-muted);
    cursor: pointer; transition: all 0.12s;
    font-family: 'Geist', sans-serif;
  }
  .pct-btn:hover { border-color: var(--text); color: var(--text); background: var(--token-hover); }

  /* Swap arrow */
  .swap-dir {
    display: flex; justify-content: center;
    position: relative; z-index: 2;
    margin: -2px 0;
  }
  .swap-dir-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--modal-bg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-muted);
    transition: all 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .swap-dir-btn:hover { border-color: var(--text); color: var(--text); transform: rotate(180deg); }

  /* Quote details */
  .quote-details {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    background: var(--input-bg);
    display: flex; flex-direction: column; gap: 7px;
    margin-top: 4px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
  .quote-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12.5px;
  }
  .quote-row-label { color: var(--text-muted); }
  .quote-row-val { color: var(--text); font-weight: 500; }
  .quote-row-val.good { color: var(--success); }
  .quote-row-val.warn { color: var(--warning); }

  /* Slippage panel */
  .slippage-panel {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    background: var(--input-bg);
    margin-top: 4px;
    animation: fadeIn 0.2s ease;
  }
  .slippage-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .slippage-options { display: flex; gap: 6px; }
  .slippage-opt {
    flex: 1; padding: 6px; border-radius: 7px;
    border: 1.5px solid var(--border);
    background: var(--modal-bg);
    font-size: 13px; font-weight: 500;
    color: var(--text-muted); cursor: pointer;
    text-align: center; transition: all 0.12s;
    font-family: 'Geist', sans-serif;
  }
  .slippage-opt:hover { border-color: var(--border-focus); color: var(--text); }
  .slippage-opt.active { background: var(--text); color: white; border-color: var(--text); }

  /* Action button */
  .action-btn {
    width: 100%; padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent); color: var(--accent-fg);
    font-size: 15px; font-weight: 600;
    font-family: 'Geist', sans-serif;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 4px;
    letter-spacing: -0.2px;
  }
  .action-btn:hover:not(:disabled) { opacity: 0.88; }
  .action-btn:active:not(:disabled) { transform: scale(0.99); }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .action-btn.secondary {
    background: var(--input-bg); color: var(--text);
    border: 1.5px solid var(--border);
  }
  .action-btn.secondary:hover:not(:disabled) { background: var(--token-hover); opacity: 1; }

  /* Spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .spinner.dark { border-color: rgba(0,0,0,0.12); border-top-color: var(--text); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Success state */
  .success-card {
    border: 1.5px solid #bbf7d0;
    background: var(--success-bg);
    border-radius: var(--radius-sm);
    padding: 14px;
    animation: fadeIn 0.3s ease;
    margin-top: 4px;
  }
  .success-header { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .success-icon { color: var(--success); }
  .success-title { font-size: 13px; font-weight: 600; color: var(--success); }
  .success-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 5px 0; }
  .success-row-label { color: var(--text-muted); }
  .success-row-val { font-weight: 500; color: var(--text); }
  .success-received { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.4px; }
  .success-received-label { font-size: 13px; color: var(--text-muted); }
  .hash-row { display: flex; align-items: center; gap: 6px; }
  .hash-text { font-family: 'Courier New', monospace; font-size: 12px; color: var(--text-muted); background: white; padding: 3px 7px; border-radius: 5px; border: 1px solid var(--border); }
  .hash-btn { width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--border); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.12s; }
  .hash-btn:hover { border-color: var(--text); color: var(--text); }

  /* Error state */
  .error-card {
    border: 1.5px solid #fecaca;
    background: var(--error-bg);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    animation: fadeIn 0.2s ease;
    margin-top: 4px;
    font-size: 13px; color: var(--error);
    display: flex; align-items: flex-start; gap: 8px;
  }

  /* Footer note */
  .modal-footer {
    font-size: 11.5px; color: var(--text-subtle);
    text-align: center; padding: 0 20px 16px;
  }

  /* ——— TOKEN PICKER ——— */
  .picker-overlay {
    position: absolute; inset: 0;
    background: var(--modal-bg);
    border-radius: var(--radius);
    display: flex; flex-direction: column;
    z-index: 20;
    animation: slideUp 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  .picker-header {
    padding: 18px 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .picker-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .picker-search-wrap {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }
  .picker-search {
    width: 100%; padding: 9px 12px 9px 36px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--input-bg);
    font-size: 14px; font-family: 'Geist', sans-serif;
    color: var(--text); outline: none;
    transition: border-color 0.15s;
    position: relative;
  }
  .picker-search:focus { border-color: var(--border-focus); }
  .picker-search-icon { position: absolute; left: 32px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .picker-search-wrap { position: relative; }
  .picker-list { flex: 1; overflow-y: auto; padding: 8px 12px 12px; }
  .picker-section-label { font-size: 10.5px; font-weight: 600; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.7px; padding: 8px 4px 4px; }
  .picker-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 8px; border-radius: 8px;
    cursor: pointer; transition: background 0.12s;
    border: 1.5px solid transparent;
  }
  .picker-item:hover { background: var(--token-hover); }
  .picker-item.selected { background: var(--token-hover); border-color: var(--border); }
  .picker-item.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
  .picker-token-logo {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    flex-shrink: 0; overflow: hidden;
  }
  .picker-token-logo img { width: 100%; height: 100%; object-fit: cover; }
  .picker-token-info { flex: 1; min-width: 0; }
  .picker-token-symbol { font-size: 14px; font-weight: 600; color: var(--text); }
  .picker-token-name { font-size: 12px; color: var(--text-muted); truncate; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .picker-token-balance { text-align: right; flex-shrink: 0; }
  .picker-token-amount { font-size: 13px; font-weight: 500; color: var(--text); }
  .picker-token-usd { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }
  .picker-check { color: var(--success); flex-shrink: 0; }

  /* Network badge */
  .network-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--input-bg); border: 1.5px solid var(--border);
    border-radius: 6px; padding: 3px 8px;
    font-size: 11.5px; font-weight: 500; color: var(--text-muted);
    cursor: default;
  }
  .network-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }

  /* App background for demo */
  .demo-bg {
    position: fixed; inset: 0;
    background: #0f0e0c;
    z-index: 0;
  }
  .demo-content {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 1;
  }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--modal-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 100;
    min-width: 220px;
    animation: fadeIn 0.2s ease;
  }
  .tweaks-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .tweak-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .tweak-label { font-size: 13px; color: var(--text); }
  .tweak-select {
    font-size: 12px; border: 1.5px solid var(--border); border-radius: 6px;
    padding: 3px 6px; background: var(--input-bg); color: var(--text);
    font-family: 'Geist', sans-serif; cursor: pointer; outline: none;
  }
  .toggle-wrap { display: flex; gap: 4px; }
  .toggle-btn {
    font-size: 11px; padding: 3px 8px; border-radius: 5px;
    border: 1.5px solid var(--border);
    background: transparent; color: var(--text-muted);
    cursor: pointer; font-family: 'Geist', sans-serif; transition: all 0.1s;
  }
  .toggle-btn.on { background: var(--text); color: white; border-color: var(--text); }
</style>

// ——— Token Picker ———
function TokenPicker({ title, tokens, selected, excluded, onSelect, onClose }) {
  const [search, setSearch] = useState('');
  const [activeTab, setActiveTab] = useState('all');
  const inputRef = useRef();
  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 50); }, []);

  const byCategory = useMemo(() => {
    const q = search.toLowerCase();
    const base = tokens.filter(t =>
      t.symbol.toLowerCase().includes(q) || t.name.toLowerCase().includes(q)
    );
    if (activeTab === 'all') return base;
    return base.filter(t => t.category === activeTab);
  }, [tokens, search, activeTab]);

  const withBalance = byCategory.filter(t => t.balance > 0);
  const withoutBalance = byCategory.filter(t => t.balance === 0);

  // Count per category for badges
  const counts = useMemo(() => {
    const q = search.toLowerCase();
    const base = tokens.filter(t =>
      t.symbol.toLowerCase().includes(q) || t.name.toLowerCase().includes(q)
    );
    const c = {};
    CATEGORIES.forEach(cat => {
      c[cat.id] = cat.id === 'all' ? base.length : base.filter(t => t.category === cat.id).length;
    });
    return c;
  }, [tokens, search]);

  return (
    <div className="picker-overlay">
      <div className="picker-header">
        <span className="picker-title">{title}</span>
        <button className="icon-btn" onClick={onClose}><IconX /></button>
      </div>

      {/* Search */}
      <div className="picker-search-wrap" style={{position:'relative'}}>
        <span style={{position:'absolute', left:32, top:'50%', transform:'translateY(-50%)', color:'var(--text-subtle)', pointerEvents:'none'}}>
          <IconSearch />
        </span>
        <input
          ref={inputRef}
          className="picker-search"
          placeholder="Search token…"
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
      </div>

      {/* Category tabs */}
      <div style={{
        display: 'flex', gap: 4, padding: '6px 12px 8px',
        borderBottom: '1px solid var(--border)',
        overflowX: 'auto', flexShrink: 0,
      }}>
        {CATEGORIES.map(cat => (
          counts[cat.id] > 0 && (
            <button
              key={cat.id}
              onClick={() => setActiveTab(cat.id)}
              style={{
                padding: '5px 10px', borderRadius: 7, border: '1.5px solid',
                borderColor: activeTab === cat.id ? 'var(--text)' : 'var(--border)',
                background: activeTab === cat.id ? 'var(--text)' : 'transparent',
                color: activeTab === cat.id ? 'var(--accent-fg)' : 'var(--text-muted)',
                fontSize: 12, fontWeight: 500, cursor: 'pointer',
                whiteSpace: 'nowrap', fontFamily: 'Geist, sans-serif',
                display: 'flex', alignItems: 'center', gap: 5,
                transition: 'all 0.12s', flexShrink: 0,
              }}
            >
              {cat.label}
              <span style={{
                fontSize: 10, fontWeight: 600,
                opacity: activeTab === cat.id ? 0.7 : 0.5,
              }}>{counts[cat.id]}</span>
            </button>
          )
        ))}
      </div>

      {/* xStocks disclaimer */}
      {activeTab === 'xstock' && (
        <div style={{
          margin: '8px 12px 0', padding: '8px 10px',
          background: '#fffbeb', border: '1px solid #fde68a',
          borderRadius: 8, fontSize: 11.5, color: '#92400e', lineHeight: 1.4,
        }}>
          ⚠️ Synthetic stocks on Solana. Prices track real-time market data. Trading available 24/7.
        </div>
      )}

      <div className="picker-list">
        {withBalance.length > 0 && (
          <>
            <div className="picker-section-label">Your wallet</div>
            {withBalance.map(t => (
              <div
                key={t.id}
                className={`picker-item ${selected?.id === t.id ? 'selected' : ''} ${excluded?.id === t.id ? 'disabled' : ''}`}
                onClick={() => { onSelect(t); onClose(); }}
              >
                <TokenLogo token={t} size={36} />
                <div className="picker-token-info">
                  <div style={{display:'flex', alignItems:'center', gap:6}}>
                    <span className="picker-token-symbol">{t.symbol}</span>
                    <CategoryTag category={t.category} />
                    {t.chain && <ChainBadge chain={t.chain} />}
                  </div>
                  <div className="picker-token-name">{t.name}</div>
                </div>
                <div className="picker-token-balance">
                  <div className="picker-token-amount">{fmt(t.balance, 4)}</div>
                  <div className="picker-token-usd">{fmtUSD(t.balance * t.price)}</div>
                </div>
                {selected?.id === t.id && <span className="picker-check"><IconCheck /></span>}
              </div>
            ))}
          </>
        )}
        {withoutBalance.length > 0 && (
          <>
            <div className="picker-section-label">{withBalance.length > 0 ? 'Other tokens' : 'All tokens'}</div>
            {withoutBalance.map(t => (
              <div
                key={t.id}
                className={`picker-item ${selected?.id === t.id ? 'selected' : ''} ${excluded?.id === t.id ? 'disabled' : ''}`}
                onClick={() => { onSelect(t); onClose(); }}
              >
                <TokenLogo token={t} size={36} />
                <div className="picker-token-info">
                  <div style={{display:'flex', alignItems:'center', gap:6}}>
                    <span className="picker-token-symbol">{t.symbol}</span>
                    <CategoryTag category={t.category} />
                    {t.chain && <ChainBadge chain={t.chain} />}
                  </div>
                  <div className="picker-token-name">{t.name}</div>
                </div>
                <div className="picker-token-balance">
                  <div style={{fontSize:13, color:'var(--text-muted)', fontWeight:500}}>{fmtUSD(t.price)}</div>
                  <div className="picker-token-usd">per token</div>
                </div>
                {selected?.id === t.id && <span className="picker-check"><IconCheck /></span>}
              </div>
            ))}
          </>
        )}
        {byCategory.length === 0 && (
          <div style={{padding:'32px 8px', textAlign:'center', color:'var(--text-muted)', fontSize:13}}>
            No tokens found{search ? ` for "${search}"` : ''}
          </div>
        )}
      </div>
    </div>
  );
}

// ——— Main Swap Modal ———
function SwapModal({ tweaks }) {
  const [fromToken, setFromToken] = useState(TOKENS[0]);
  const [toToken, setToToken] = useState(TOKENS[1]);
  const [amount, setAmount] = useState('');
  const [slippage, setSlippage] = useState(0.5);
  const [showSettings, setShowSettings] = useState(false);
  const [pickerFor, setPickerFor] = useState(null); // 'from' | 'to' | null
  const [state, setState] = useState('idle'); // idle | quoting | quoted | executing | success | error
  const [quote, setQuote] = useState(null);
  const [copied, setCopied] = useState(false);
  const inputRef = useRef();

  const fromBalance = fromToken ? fromToken.balance : 0;
  const fromUSD = amount && fromToken ? Number(amount) * fromToken.price : 0;
  const insufficient = amount && fromToken && Number(amount) > fromBalance;
  const canGetQuote = fromToken && toToken && amount && Number(amount) > 0 && !insufficient;

  // Simulate quote
  const getQuote = () => {
    if (!canGetQuote) return;
    setState('quoting');
    setQuote(null);
    setTimeout(() => {
      const rate = fromToken.price / toToken.price;
      const toAmount = Number(amount) * rate * 0.9975;
      const priceImpact = Math.random() * 0.4 + 0.05;
      setQuote({
        toAmount: toAmount.toFixed(toToken.decimals > 4 ? 4 : 2),
        toUSD: toAmount * toToken.price,
        minReceived: (toAmount * (1 - slippage/100)).toFixed(4),
        priceImpact: priceImpact.toFixed(2),
        fee: (fromUSD * 0.0025).toFixed(2),
        route: `${fromToken.symbol} → ${toToken.symbol}`,
      });
      setState('quoted');
    }, tweaks.fastQuote ? 400 : 1200);
  };

  // Simulate execute
  const executeSwap = () => {
    setState('executing');
    setTimeout(() => {
      setState('success');
    }, tweaks.fastQuote ? 600 : 2000);
  };

  const swapTokens = () => {
    const tmp = fromToken;
    setFromToken(toToken);
    setToToken(tmp);
    setAmount(quote ? quote.toAmount : '');
    setQuote(null);
    setState('idle');
  };

  const setPercent = (pct) => {
    const val = (fromBalance * pct / 100);
    setAmount(val > 0 ? String(Number(val.toFixed(6))) : '');
    setQuote(null);
    if (state !== 'idle') setState('idle');
  };

  const handleAmountChange = (v) => {
    setAmount(v);
    setQuote(null);
    if (state !== 'idle') setState('idle');
  };

  const handleTokenSelect = (token) => {
    if (pickerFor === 'from') setFromToken(token);
    else setToToken(token);
    setQuote(null);
    setState('idle');
    setAmount('');
  };

  const resetAfterSuccess = () => {
    setState('idle');
    setAmount('');
    setQuote(null);
    // Simulate balance update
    if (fromToken) {
      fromToken.balance = Math.max(0, fromToken.balance - Number(amount));
    }
  };

  const isLoading = state === 'quoting' || state === 'executing';
  const showSuccess = state === 'success';

  const mockHash = '0x3b6d...49fb2s';

  // Button config
  let btnLabel = 'Get Quote';
  let btnAction = getQuote;
  if (state === 'quoting') { btnLabel = 'Getting Quote…'; btnAction = null; }
  if (state === 'quoted') { btnLabel = 'Execute Swap'; btnAction = executeSwap; }
  if (state === 'executing') { btnLabel = 'Executing…'; btnAction = null; }
  if (state === 'success') { btnLabel = 'Swap Again'; btnAction = resetAfterSuccess; }

  return (
    <div className="modal" style={{maxWidth: tweaks.compact ? 390 : 440}}>
      {/* Token Picker Overlay */}
      {pickerFor && (
        <TokenPicker
          title={pickerFor === 'from' ? 'You pay' : 'You receive'}
          tokens={TOKENS}
          selected={pickerFor === 'from' ? fromToken : toToken}
          excluded={pickerFor === 'from' ? toToken : fromToken}
          onSelect={handleTokenSelect}
          onClose={() => setPickerFor(null)}
        />
      )}

      {/* Header */}
      <div className="modal-header">
        <div className="modal-header-left">
          <div className="modal-logo">Y</div>
          <span className="modal-title">Swap Tokens</span>
        </div>
        <div className="modal-header-right">
          <div className="network-badge">
            <div className="network-dot"></div>
            Aptos
          </div>
          <button
            className="icon-btn"
            onClick={() => setShowSettings(s => !s)}
            style={showSettings ? {background:'var(--token-hover)', color:'var(--text)'} : {}}
          >
            <IconSettings />
          </button>
          <button className="icon-btn"><IconX /></button>
        </div>
      </div>

      <div className="modal-body">
        {/* Settings / Slippage */}
        {showSettings && (
          <div className="slippage-panel">
            <div className="slippage-label">Slippage tolerance</div>
            <div className="slippage-options">
              {[0.5, 1.0, 2.0, 5.0].map(v => (
                <button
                  key={v}
                  className={`slippage-opt ${slippage === v ? 'active' : ''}`}
                  onClick={() => { setSlippage(v); setQuote(null); setState('idle'); }}
                >{v}%</button>
              ))}
            </div>
          </div>
        )}

        {/* FROM card */}
        <div className="token-card">
          <div className="token-card-label">You pay</div>
          <div className="token-card-main">
            {fromToken ? (
              <button className="token-selector" onClick={() => setPickerFor('from')}>
                <TokenLogo token={fromToken} size={24} />
                <span className="token-selector-symbol">{fromToken.symbol}</span>
                <span className="token-selector-chevron"><IconChevron /></span>
              </button>
            ) : (
              <button className="token-selector" onClick={() => setPickerFor('from')} style={{color:'var(--text-muted)'}}>
                <span style={{fontSize:13}}>Select token</span>
                <span className="token-selector-chevron"><IconChevron /></span>
              </button>
            )}
            <div className="amount-wrap">
              <input
                ref={inputRef}
                type="number"
                className="amount-input"
                placeholder="0"
                value={amount}
                onChange={e => handleAmountChange(e.target.value)}
                disabled={isLoading}
              />
              {fromToken && amount && (
                <div className="amount-usd">{fmtUSD(fromUSD)}</div>
              )}
            </div>
          </div>
          <div className="balance-row">
            <div className="balance-text">
              Balance: <strong>{fmt(fromBalance, 4)} {fromToken?.symbol}</strong>
              {fromToken && <span style={{marginLeft:4, color:'var(--text-subtle)'}}>≈ {fmtUSD(fromBalance * (fromToken?.price||0))}</span>}
            </div>
            <div className="pct-btns">
              <button className="pct-btn" onClick={() => setPercent(25)}>25%</button>
              <button className="pct-btn" onClick={() => setPercent(50)}>50%</button>
              <button className="pct-btn" onClick={() => setPercent(100)}>Max</button>
            </div>
          </div>
          {insufficient && (
            <div style={{marginTop:8, fontSize:12, color:'var(--error)'}}>
              Insufficient balance — you need {fmt(Number(amount), 4)} but have {fmt(fromBalance, 4)} {fromToken?.symbol}
            </div>
          )}
        </div>

        {/* Swap direction */}
        <div className="swap-dir">
          <button className="swap-dir-btn" onClick={swapTokens} title="Swap tokens">
            <IconSwap />
          </button>
        </div>

        {/* TO card */}
        <div className="token-card" style={{borderStyle: state === 'quoted' ? 'solid' : 'dashed', borderColor: state === 'quoted' ? 'var(--border-focus)' : 'var(--border)'}}>
          <div className="token-card-label">You receive</div>
          <div className="token-card-main">
            {toToken ? (
              <button className="token-selector" onClick={() => setPickerFor('to')}>
                <TokenLogo token={toToken} size={24} />
                <span className="token-selector-symbol">{toToken.symbol}</span>
                <span className="token-selector-chevron"><IconChevron /></span>
              </button>
            ) : (
              <button className="token-selector" onClick={() => setPickerFor('to')} style={{color:'var(--text-muted)'}}>
                <span style={{fontSize:13}}>Select token</span>
                <span className="token-selector-chevron"><IconChevron /></span>
              </button>
            )}
            <div className="amount-wrap">
              {state === 'quoting' ? (
                <div className="amount-readonly loading">Quoting…</div>
              ) : quote ? (
                <>
                  <div className="amount-readonly">{fmt(Number(quote.toAmount), 6)}</div>
                  <div className="amount-usd">{fmtUSD(quote.toUSD)}</div>
                </>
              ) : (
                <div className="amount-readonly placeholder">—</div>
              )}
            </div>
          </div>
          {toToken && (
            <div className="balance-row">
              <div className="balance-text">
                Balance: <strong>{fmt(toToken.balance, 4)} {toToken.symbol}</strong>
                <span style={{marginLeft:4, color:'var(--text-subtle)'}}>≈ {fmtUSD(toToken.balance * toToken.price)}</span>
              </div>
            </div>
          )}
        </div>

        {/* Quote details */}
        {quote && state !== 'success' && (
          <div className="quote-details">
            <div className="quote-row">
              <span className="quote-row-label" style={{display:'flex',alignItems:'center',gap:4}}><IconInfo /> Rate</span>
              <span className="quote-row-val">1 {fromToken?.symbol} ≈ {fmt(fromToken.price/toToken.price, 4)} {toToken?.symbol}</span>
            </div>
            <div className="quote-row">
              <span className="quote-row-label">Min received</span>
              <span className="quote-row-val">{quote.minReceived} {toToken?.symbol}</span>
            </div>
            <div className="quote-row">
              <span className="quote-row-label">Price impact</span>
              <span className={`quote-row-val ${Number(quote.priceImpact) < 1 ? 'good' : 'warn'}`}>-{quote.priceImpact}%</span>
            </div>
            <div style={{borderTop:'1px solid var(--border)', marginTop:2, paddingTop:7, display:'flex', justifyContent:'space-between'}}>
              <span className="quote-row-label" style={{fontSize:12}}>Slippage · Fee</span>
              <span className="quote-row-val" style={{fontSize:12}}>{slippage}% · 0.25%</span>
            </div>
          </div>
        )}

        {/* Success card */}
        {showSuccess && (
          <div className="success-card">
            <div className="success-header">
              <span className="success-icon"><IconSuccess /></span>
              <span className="success-title">Gasless swap executed!</span>
            </div>
            <div className="success-row">
              <span className="success-row-label">Received</span>
              <span style={{display:'flex', flexDirection:'column', alignItems:'flex-end'}}>
                <span className="success-received">{quote?.toAmount} {toToken?.symbol}</span>
                <span className="success-row-val" style={{fontSize:12, color:'var(--text-muted)'}}>{fmtUSD(quote?.toUSD)}</span>
              </span>
            </div>
            <div className="success-row" style={{marginTop:6}}>
              <span className="success-row-label">Gas fee</span>
              <span className="success-row-val" style={{color:'var(--success)', fontWeight:600}}>Paid by Gas Station</span>
            </div>
            <div className="success-row" style={{marginTop:2}}>
              <span className="success-row-label">Tx hash</span>
              <div className="hash-row">
                <span className="hash-text">{mockHash}</span>
                <button className="hash-btn" onClick={() => {setCopied(true); setTimeout(()=>setCopied(false),1500);}}>
                  {copied ? <IconCheck /> : <IconCopy />}
                </button>
                <button className="hash-btn"><IconExternal /></button>
              </div>
            </div>
          </div>
        )}

        {/* Action button */}
        <button
          className="action-btn"
          onClick={btnAction}
          disabled={isLoading || (!canGetQuote && state !== 'success')}
          style={showSuccess ? {background:'var(--success)'} : {}}
        >
          {isLoading && <div className="spinner"></div>}
          {btnLabel}
        </button>

        {/* Re-quote hint */}
        {state === 'quoted' && (
          <button className="action-btn secondary" onClick={getQuote}>
            Refresh Quote
          </button>
        )}
      </div>

      <div className="modal-footer">
        Gasless · no APT required for gas · 0.25% swap fee
      </div>
    </div>
  );
}

// ——— Tweaks ———
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "compact": false,
  "fastQuote": false,
  "darkMode": false
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('swap_tweaks')||'{}') }; }
    catch { return TWEAK_DEFAULTS; }
  });
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(() => {
    localStorage.setItem('swap_tweaks', JSON.stringify(tweaks));
  }, [tweaks]);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (k, v) => {
    const next = {...tweaks, [k]: v};
    setTweaks(next);
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: next}, '*');
  };

  // Apply dark mode CSS vars
  useEffect(() => {
    if (tweaks.darkMode) {
      document.documentElement.style.setProperty('--bg', '#0f0e0c');
      document.documentElement.style.setProperty('--modal-bg', '#1a1917');
      document.documentElement.style.setProperty('--border', '#2e2c28');
      document.documentElement.style.setProperty('--border-focus', '#4a4740');
      document.documentElement.style.setProperty('--text', '#f5f3ef');
      document.documentElement.style.setProperty('--text-muted', '#8a8580');
      document.documentElement.style.setProperty('--text-subtle', '#524f4a');
      document.documentElement.style.setProperty('--accent', '#f5f3ef');
      document.documentElement.style.setProperty('--accent-fg', '#141210');
      document.documentElement.style.setProperty('--token-hover', '#242220');
      document.documentElement.style.setProperty('--input-bg', '#141312');
      document.documentElement.style.setProperty('--success-bg', '#0f1f13');
    } else {
      document.documentElement.style.setProperty('--bg', '#f5f4f2');
      document.documentElement.style.setProperty('--modal-bg', '#ffffff');
      document.documentElement.style.setProperty('--border', '#e8e6e1');
      document.documentElement.style.setProperty('--border-focus', '#c8c4bc');
      document.documentElement.style.setProperty('--text', '#141210');
      document.documentElement.style.setProperty('--text-muted', '#8a8680');
      document.documentElement.style.setProperty('--text-subtle', '#b5b0a8');
      document.documentElement.style.setProperty('--accent', '#141210');
      document.documentElement.style.setProperty('--accent-fg', '#ffffff');
      document.documentElement.style.setProperty('--token-hover', '#f8f7f5');
      document.documentElement.style.setProperty('--input-bg', '#faf9f7');
      document.documentElement.style.setProperty('--success-bg', '#f0fdf4');
    }
  }, [tweaks.darkMode]);

  return (
    <>
      <div className="overlay">
        <SwapModal tweaks={tweaks} />
      </div>

      {showTweaks && (
        <div className="tweaks-panel">
          <div className="tweaks-title">Tweaks</div>
          <div className="tweak-row">
            <span className="tweak-label">Theme</span>
            <div className="toggle-wrap">
              <button className={`toggle-btn ${!tweaks.darkMode ? 'on' : ''}`} onClick={() => setTweak('darkMode', false)}>Light</button>
              <button className={`toggle-btn ${tweaks.darkMode ? 'on' : ''}`} onClick={() => setTweak('darkMode', true)}>Dark</button>
            </div>
          </div>
          <div className="tweak-row">
            <span className="tweak-label">Width</span>
            <div className="toggle-wrap">
              <button className={`toggle-btn ${!tweaks.compact ? 'on' : ''}`} onClick={() => setTweak('compact', false)}>Normal</button>
              <button className={`toggle-btn ${tweaks.compact ? 'on' : ''}`} onClick={() => setTweak('compact', true)}>Compact</button>
            </div>
          </div>
          <div className="tweak-row">
            <span className="tweak-label">Quote speed</span>
            <div className="toggle-wrap">
              <button className={`toggle-btn ${!tweaks.fastQuote ? 'on' : ''}`} onClick={() => setTweak('fastQuote', false)}>Real</button>
              <button className={`toggle-btn ${tweaks.fastQuote ? 'on' : ''}`} onClick={() => setTweak('fastQuote', true)}>Fast</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
